<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Dashboard</title>
</head>
<body class="dashboard-body">

<div class="app">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <h2>ToDoList</h2>

        <ul>
            <li class="active">Inbox</li>
            <li>Hoje</li>
            <li>Em breve</li>
        </ul>

        <button id="logoutBtn">Logout</button>
    </aside>

    <!-- MAIN -->
    <main class="main">

        <header class="main-header">
            <h1>Inbox</h1>
        </header>

        <!-- INPUT -->
        <div class="task-input">
            <input id="taskInput" type="text" placeholder="Adicionar tarefa...">
            <button id="addTask">Adicionar</button>
        </div>

        <!-- LISTA -->
        <ul id="taskList" class="task-list"></ul>

    </main>

</div>

</body>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { 
    getFirestore, collection, addDoc, query, where, getDocs, 
    updateDoc, deleteDoc, doc 
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyDCowNCQIA_GlY44S-7F_oF7TvkQmCSPTM",
    authDomain: "todo-ac586.firebaseapp.com",
    projectId: "todo-ac586",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;

const taskInput = document.getElementById("taskInput");
const addTaskBtn = document.getElementById("addTask");
const taskList = document.getElementById("taskList");

/* 🔐 PROTEÇÃO */
onAuthStateChanged(auth, (user) => {
    if (!user) {
        window.location.href = "login.html";
    } else {
        currentUser = user;
        carregarTarefas();
    }
});

/* 🚪 LOGOUT */
document.getElementById("logoutBtn").onclick = async () => {
    await signOut(auth);
    window.location.href = "index.html";
};

/* ➕ CRIAR */
addTaskBtn.onclick = async () => {
    const text = taskInput.value.trim();
    if (!text) return;

    await addDoc(collection(db, "tasks"), {
        userId: currentUser.uid,
        text,
        done: false,
        createdAt: new Date()
    });

    taskInput.value = "";
    carregarTarefas();
};

/* 📥 LISTAR */
async function carregarTarefas(){
    taskList.innerHTML = "";

    const q = query(
        collection(db, "tasks"),
        where("userId", "==", currentUser.uid)
    );

    const snapshot = await getDocs(q);

    snapshot.forEach(docSnap => {
        const data = docSnap.data();

        const li = document.createElement("li");
        li.className = "task-item";

        li.innerHTML = `
            <div class="task-left">
                <button class="check ${data.done ? "checked" : ""}"></button>

                <input 
                    class="task-text ${data.done ? "done" : ""}" 
                    value="${data.text}" 
                    disabled
                >
            </div>

            <div class="task-actions">
                <button class="editBtn">✏️</button>
                <button class="deleteBtn">🗑</button>
            </div>
        `;

        const input = li.querySelector(".task-text");
        const editBtn = li.querySelector(".editBtn");

        editBtn.onclick = () => {
            input.disabled = false;
            input.focus();
        };

        /* salva ao sair do campo */
        input.onblur = async () => {
            input.disabled = true;

            await updateDoc(doc(db, "tasks", docSnap.id), {
                text: input.value
            });
        };

        li.querySelector(".check").onclick = async () => {
            await updateDoc(doc(db, "tasks", docSnap.id), {
                done: !data.done
            });
            carregarTarefas();
        };

        li.querySelector(".deleteBtn").onclick = async () => {
            await deleteDoc(doc(db, "tasks", docSnap.id));
            carregarTarefas();
        };

        taskList.appendChild(li);
    });
}
</script>
</html>
